<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Mahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <nav class="bg-blue-600 text-white p-4 shadow-md mb-8">
        <div class="container mx-auto max-w-7xl flex justify-between items-center px-4">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                🎓 Task Manager Mahasiswa
            </h1>
            <span class="text-sm bg-blue-700 px-3 py-1 rounded-full font-semibold border border-blue-500">v1.0 (Pro)</span>
        </div>
    </nav>

    <main class="container mx-auto max-w-7xl px-4 pb-12">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-lg font-semibold text-gray-700">Progres Keseluruhan</h2>
                <span id="teksPersentase" class="text-sm font-bold text-blue-600">0% Selesai</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-4 shadow-inner">
                <div id="bilahProgres" class="bg-gradient-to-r from-blue-500 to-blue-600 h-4 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
            </div>
            <p id="teksRasio" class="text-sm text-gray-500 mt-2">0 dari 0 tugas telah diselesaikan</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
                <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-3 flex items-center gap-2">
                    <span>➕</span> Tambah Tugas Baru
                </h2>
                <form id="formTugas" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Mata Kuliah / Kategori</label>
                        <input type="text" id="matkul" required class="w-full rounded-lg border-gray-300 border p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow" placeholder="Contoh: Data Mining">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Detail Pekerjaan</label>
                        <textarea id="deskripsi" required rows="3" class="w-full rounded-lg border-gray-300 border p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow" placeholder="Contoh: Membuat laporan bab 1-3"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tingkat Prioritas</label>
                        <select id="prioritas" class="w-full rounded-lg border-gray-300 border p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow">
                            <option value="Rendah">⚪ Rendah</option>
                            <option value="Sedang" selected>🟡 Sedang</option>
                            <option value="Tinggi">🔴 Tinggi</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tenggat Waktu (Deadline)</label>
                        <input type="datetime-local" id="deadline" required class="w-full rounded-lg border-gray-300 border p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition-colors shadow-md hover:shadow-lg mt-2">
                        Simpan Tugas
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                
                <div class="flex flex-col md:flex-row justify-between items-center mb-6 space-y-3 md:space-y-0 md:space-x-4 bg-slate-50 p-4 rounded-xl border border-gray-200">
                    <div class="w-full md:w-2/3 relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">🔍</span>
                        <input type="text" id="inputCari" placeholder="Cari mata kuliah atau tugas..." class="w-full pl-10 rounded-lg border-gray-300 border p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <select id="filterStatus" class="w-full md:w-1/3 rounded-lg border-gray-300 border p-2.5 focus:ring-2 focus:ring-blue-500 outline-none font-medium text-gray-700">
                        <option value="Semua">Semua Status</option>
                        <option value="Aktif">⏳ Hanya Aktif</option>
                        <option value="Selesai">✅ Sudah Selesai</option>
                    </select>
                </div>

                <div class="overflow-x-auto rounded-xl border border-gray-200">
                    <table class="min-w-full text-left text-sm text-gray-600 whitespace-nowrap">
                        <thead class="bg-gray-100 border-b border-gray-200 text-gray-700">
                            <tr>
                                <th class="px-5 py-4 font-semibold">ID</th>
                                <th class="px-5 py-4 font-semibold">Kategori</th>
                                <th class="px-5 py-4 font-semibold">Detail</th>
                                <th class="px-5 py-4 font-semibold text-center">Prioritas</th>
                                <th class="px-5 py-4 font-semibold">Deadline</th>
                                <th class="px-5 py-4 font-semibold text-center">Status</th>
                                <th class="px-5 py-4 font-semibold text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelTugas" class="divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        let semuaTugas = [];
        let idTugasDiedit = null; // Menyimpan ID tugas yang sedang diedit (null artinya mode tambah)

        // 1. Muat Data dari Backend
        async function muatTugas() {
            try {
                const response = await fetch('/api/tugas');
                semuaTugas = await response.json();
                terapkanFilter();
            } catch (error) {
                console.error("Gagal memuat tugas:", error);
            }
        }

        // 2. Terapkan Filter & Pencarian
        function terapkanFilter() {
            const kataKunci = document.getElementById('inputCari').value.toLowerCase();
            const status = document.getElementById('filterStatus').value;

            const tugasDifilter = semuaTugas.filter(tugas => {
                const cocokKataKunci = tugas.mata_kuliah.toLowerCase().includes(kataKunci) || 
                                       tugas.deskripsi.toLowerCase().includes(kataKunci);
                
                let cocokStatus = true;
                if (status === "Aktif") cocokStatus = !tugas.is_selesai;
                if (status === "Selesai") cocokStatus = tugas.is_selesai;

                return cocokKataKunci && cocokStatus;
            });

            renderTabel(tugasDifilter);
        }

        // 3. Render Tabel & Progress Bar
        function renderTabel(data) {
            const tabel = document.getElementById('tabelTugas');
            tabel.innerHTML = '';
            
            const totalTugas = semuaTugas.length;
            const tugasSelesai = semuaTugas.filter(t => t.is_selesai).length;
            const persentase = totalTugas > 0 ? Math.round((tugasSelesai / totalTugas) * 100) : 0;
            
            document.getElementById('bilahProgres').style.width = `${persentase}%`;
            document.getElementById('teksPersentase').innerText = `${persentase}% Selesai`;
            document.getElementById('teksRasio').innerText = `${tugasSelesai} dari ${totalTugas} tugas telah diselesaikan`;

            if (data.length === 0) {
                tabel.innerHTML = `<tr><td colspan="7" class="text-center py-8 text-gray-500 font-medium">Data tidak ditemukan atau belum ada tugas.</td></tr>`;
                return;
            }

            data.forEach(tugas => {
                const tanggalMentah = new Date(tugas.deadline);
                const opsiFormat = { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' };
                const tanggalRapi = isNaN(tanggalMentah) ? tugas.deadline : tanggalMentah.toLocaleDateString('id-ID', opsiFormat);

                let warnaPrioritas = "";
                if (tugas.prioritas === "Tinggi") warnaPrioritas = "bg-red-100 text-red-800 border-red-200";
                else if (tugas.prioritas === "Sedang") warnaPrioritas = "bg-yellow-100 text-yellow-800 border-yellow-200";
                else warnaPrioritas = "bg-gray-100 text-gray-800 border-gray-200";

                const baris = `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-5 py-4 font-medium text-gray-500">${tugas.id}</td>
                        <td class="px-5 py-4 font-bold text-blue-700">${tugas.mata_kuliah}</td>
                        <td class="px-5 py-4 whitespace-normal min-w-[200px] text-gray-700">${tugas.deskripsi}</td>
                        <td class="px-5 py-4 text-center">
                            <span class="px-3 py-1 text-xs font-bold rounded-full border shadow-sm ${warnaPrioritas}">${tugas.prioritas}</span>
                        </td>
                        <td class="px-5 py-4">
                            <span class="bg-rose-50 text-rose-700 text-xs font-semibold px-3 py-1.5 rounded-lg border border-rose-100 shadow-sm">
                                📅 ${tanggalRapi}
                            </span>
                        </td>
                        <td class="px-5 py-4 text-center">
                            ${tugas.is_selesai 
                                ? '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">✅ Selesai</span>' 
                                : '<span class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-xs font-bold">⏳ Aktif</span>'}
                        </td>
                        <td class="px-5 py-4">
                            <div class="flex justify-center space-x-4">
                                ${!tugas.is_selesai 
                                    ? `<button onclick="selesaikanTugas(${tugas.id})" class="text-xl transform hover:scale-125 transition-transform" title="Tandai Selesai">✅</button>` 
                                    : ''}
                                <button onclick="bukaModeEdit(${tugas.id})" class="text-xl transform hover:scale-125 transition-transform" title="Edit Tugas">✏️</button>
                                <button onclick="hapusTugas(${tugas.id})" class="text-xl transform hover:scale-125 transition-transform" title="Hapus Tugas">🗑️</button>
                            </div>
                        </td>
                    </tr>
                `;
                tabel.innerHTML += baris;
            });
        }

        // 4. Fungsi Mengaktifkan Mode Edit (Mengisi Form Kiri dengan Data Lama)
        function bukaModeEdit(id) {
            const tugas = semuaTugas.find(t => t.id === id);
            if (!tugas) return;

            idTugasDiedit = id; // Set ID tugas yang sedang kita kunci untuk diedit

            // Isi nilai form dengan data tugas saat ini
            document.getElementById('matkul').value = tugas.mata_kuliah;
            document.getElementById('deskripsi').value = tugas.deskripsi;
            document.getElementById('prioritas').value = tugas.prioritas;
            
            // Format datetime-local harus yyyy-MM-ddTHH:mm
            const tgl = new Date(tugas.deadline);
            const formatWaktu = tgl.getFullYear() + '-' + 
                                String(tgl.getMonth() + 1).padStart(2, '0') + '-' + 
                                String(tgl.getDate()).padStart(2, '0') + 'T' + 
                                String(tgl.getHours()).padStart(2, '0') + ':' + 
                                String(tgl.getMinutes()).padStart(2, '0');
            document.getElementById('deadline').value = formatWaktu;

            // Ubah Tampilan Form Kiri menjadi Mode Edit
            document.querySelector('#formTugas p')?.remove(); // Hapus tombol batal lama jika ada
            document.getElementById('formTugas').previousElementSibling.innerHTML = "✏️ Edit Tugas (ID: " + id + ")";
            const tombolSimpan = document.querySelector('#formTugas button[type="submit"]');
            tombolSimpan.innerText = "Perbarui Tugas";
            tombolSimpan.className = "w-full bg-amber-500 text-white font-bold py-3 px-4 rounded-lg hover:bg-amber-600 transition-colors shadow-md mt-2";

            // Tambahkan tombol Batal di bawahnya
            const tombolBatal = document.createElement('p');
            tombolBatal.innerHTML = `<button type="button" onclick="resetForm()" class="w-full bg-gray-400 text-white font-semibold py-2 px-4 rounded-lg hover:bg-gray-500 transition-colors mt-2 text-sm">Batal Edit</button>`;
            document.getElementById('formTugas').appendChild(tombolBatal);
            
            // Scroll otomatis ke form agar nyaman di HP
            document.getElementById('formTugas').scrollIntoView({ behavior: 'smooth' });
        }

        // Fungsi Reset Form Kembali ke Mode Tambah Normal
        function resetForm() {
            idTugasDiedit = null;
            document.getElementById('formTugas').reset();
            document.getElementById('formTugas').previousElementSibling.innerHTML = "<span>➕</span> Tambah Tugas Baru";
            const tombolSimpan = document.querySelector('#formTugas button[type="submit"]');
            tombolSimpan.innerText = "Simpan Tugas";
            tombolSimpan.className = "w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition-colors shadow-md mt-2";
            document.querySelector('#formTugas p')?.remove(); // Hapus tombol batal
        }

        // 5. Jalur Submit Form (Bisa Tambah Baru ATAU Edit)
        document.getElementById('formTugas').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dataTugas = {
                mata_kuliah: document.getElementById('matkul').value,
                deskripsi: document.getElementById('deskripsi').value,
                deadline: document.getElementById('deadline').value,
                prioritas: document.getElementById('prioritas').value,
                is_selesai: false
            };
            
            let url = '/api/tugas';
            let metode = 'POST';

            // Jika idTugasDiedit ada operates, kita beralih ke rute PUT (Edit)
            if (idTugasDiedit !== null) {
                url = `/api/tugas/${idTugasDiedit}`;
                metode = 'PUT';
            }

            const response = await fetch(url, {
                method: metode,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataTugas)
            });

            if (response.ok) {
                resetForm();
                muatTugas();
                
                Swal.fire({
                    icon: 'success',
                    title: metode === 'POST' ? 'Tugas Tersimpan!' : 'Tugas Diperbarui!',
                    text: 'Data berhasil disinkronisasi.',
                    timer: 2000,
                    showConfirmButton: false
                });
            }
        });

        // 6. Aksi Selesaikan Tugas
        async function selesaikanTugas(id) {
            Swal.fire({
                title: 'Selesaikan Tugas?',
                text: "Kerja bagus! Tandai tugas ini sebagai selesai?",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#9ca3af',
                confirmButtonText: 'Ya, Selesai!',
                cancelButtonText: 'Batal'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const response = await fetch(`/api/tugas/${id}/selesai`, { method: 'PUT' });
                    if (response.ok) {
                        if(idTugasDiedit === id) resetForm();
                        muatTugas();
                        Swal.fire('Mantap!', 'Tugas selesai.', 'success');
                    }
                }
            });
        }

        // 7. Aksi Hapus Tugas
        async function hapusTugas(id) {
            Swal.fire({
                title: 'Hapus Tugas?',
                text: "Data yang dihapus tidak bisa dikembalikan!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#9ca3af',
                confirmButtonText: 'Ya, Hapus!',
                cancelButtonText: 'Batal'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const response = await fetch(`/api/tugas/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        if(idTugasDiedit === id) resetForm();
                        muatTugas();
                        Swal.fire('Terhapus!', 'Tugas berhasil dihapus.', 'success');
                    }
                }
            });
        }

        // 8. Event Listener Pencarian & Filter
        document.getElementById('inputCari').addEventListener('input', terapkanFilter);
        document.getElementById('filterStatus').addEventListener('change', terapkanFilter);

        // 9. Jalankan Saat Halaman Dimuat
        muatTugas();
    </script>
</body>
</html>
