<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Task Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style> .progress-bar-animated { transition: width 0.5s ease-in-out; } </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 pb-10">

    <!-- Auth Section -->
    <div id="auth-section" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-500 to-purple-600 p-4">
        <div class="bg-white p-6 md:p-8 rounded-xl shadow-2xl w-full max-w-md">
            <div class="text-center mb-6">
                <h1 class="text-4xl mb-2">🎓</h1>
                <h2 class="text-2xl font-bold text-gray-800" id="auth-title">Masuk ke Akun Anda</h2>
            </div>
            
            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="mb-4"><label class="block text-sm font-semibold text-gray-600 mb-1">Username</label><input type="text" id="username" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" required></div>
                <div class="mb-4"><label class="block text-sm font-semibold text-gray-600 mb-1">Password</label><input type="password" id="password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" required></div>
                
                <div class="mb-6 hidden" id="telegram-input-group">
                    <label class="block text-sm font-semibold text-gray-600 mb-1">ID Telegram (Opsional)</label>
                    <input type="text" id="telegram_id" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Contoh: 123456789">
                    <div class="mt-2 p-3 bg-blue-50 rounded border border-blue-200 text-sm">
                        <p class="font-bold text-blue-800 mb-1">🤔 Cara cari ID Telegram?</p>
                        <p class="text-blue-700">1. Buka bot di Telegram</p>
                        <p class="text-blue-700">2. Ketik perintah <b>/status</b></p>
                        <p class="text-blue-700">3. Copy angka ID yang muncul & paste di atas.</p>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-lg" id="auth-btn">Masuk Sekarang</button>
            </form>
            <div class="mt-6 text-center text-sm"><p id="auth-switch-text" class="text-gray-600">Belum punya akun? <a href="#" onclick="toggleAuthMode()" class="text-blue-600 font-bold hover:underline">Daftar sekarang</a></p></div>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard-section" class="hidden p-4 md:p-6 max-w-5xl mx-auto mt-2">
        
        <!-- Header & Profil (Mobile Friendly) -->
        <div class="bg-white p-4 md:p-6 rounded-xl shadow-md mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold text-gray-800">🎓 Task Manager</h1>
                <p class="text-gray-500 font-semibold mt-1">Halo, <span id="user-display-name" class="text-blue-600">Mahasiswa</span>! ✌️</p>
            </div>
            <button onclick="logout()" class="w-full md:w-auto bg-red-500 text-white px-5 py-2 rounded-lg font-bold hover:bg-red-600 transition shadow">Logout</button>
        </div>
        
        <!-- Progress Bar -->
        <div class="bg-white p-4 md:p-6 rounded-xl shadow-md mb-6">
            <div class="mb-2 flex justify-between text-xs md:text-sm font-bold text-gray-600"><span>Progress Tugas Selesai</span><span id="progress-text">0%</span></div>
            <div class="w-full bg-gray-200 rounded-full h-4 shadow-inner overflow-hidden"><div id="progress-bar" class="bg-gradient-to-r from-green-400 to-green-600 h-4 rounded-full progress-bar-animated" style="width: 0%"></div></div>
        </div>
        
        <!-- Form Tambah/Edit Tugas (Mobile Friendly) -->
        <div class="bg-white p-4 md:p-6 rounded-xl shadow-md mb-8 border-t-4 border-blue-500">
            <h2 class="text-lg md:text-xl font-bold mb-4 text-gray-700" id="form-title">📝 Tambah Tugas Baru</h2>
            <!-- Ditambahkan w-full agar tidak bentrok di HP -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="matkul" placeholder="Mata Kuliah" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                <input type="text" id="deskripsi" placeholder="Deskripsi Tugas" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                <input type="datetime-local" id="deadline" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                <select id="prioritas" class="w-full p-3 border border-gray-300 rounded-lg font-semibold focus:ring-2 focus:ring-blue-500">
                    <option value="Tinggi">🔥 Prioritas Tinggi</option>
                    <option value="Sedang">⚠️ Prioritas Sedang</option>
                    <option value="Rendah">🟢 Prioritas Rendah</option>
                </select>
            </div>
            <div class="flex flex-col md:flex-row gap-2 mt-4">
                <button onclick="simpanTugas()" id="btn-simpan" class="w-full md:flex-1 bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow">Simpan Tugas</button>
                <button onclick="batalEdit()" id="btn-batal" class="hidden w-full md:w-1/3 bg-gray-500 text-white font-bold py-3 rounded-lg hover:bg-gray-600 shadow">Batal</button>
            </div>
        </div>

        <!-- Filter & Search Bar (Mobile Friendly) -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-3 bg-white p-4 rounded-xl shadow-sm border">
            <h2 class="text-xl font-bold text-gray-800 w-full md:w-auto text-left">📋 Daftar Tugas</h2>
            <div class="flex flex-col md:flex-row w-full md:w-auto gap-2">
                <input type="text" id="search-input" oninput="renderTugas()" placeholder="🔍 Cari..." class="w-full p-2 border border-gray-300 rounded-lg md:w-48 text-sm">
                <select id="filter-status" onchange="renderTugas()" class="w-full p-2 border border-gray-300 rounded-lg font-semibold text-sm">
                    <option value="Semua">Semua</option>
                    <option value="Aktif">Aktif</option>
                    <option value="Selesai">Selesai</option>
                    <option value="Tinggi">🔥 Tinggi</option>
                </select>
            </div>
        </div>

        <!-- Daftar Tugas -->
        <div id="list-tugas" class="grid gap-4 mb-8"></div>
    </div>

    <script>
        let isLoginMode = true;
        let semuaTugas = [];
        let editId = null;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById("auth-title").innerText = isLoginMode ? "Masuk ke Akun Anda" : "Buat Akun Baru";
            document.getElementById("auth-btn").innerText = isLoginMode ? "Masuk Sekarang" : "Daftar Akun";
            document.getElementById("auth-switch-text").innerHTML = isLoginMode ? 'Belum punya akun? <a href="#" onclick="toggleAuthMode()" class="text-blue-600 font-bold">Daftar sekarang</a>' : 'Sudah punya akun? <a href="#" onclick="toggleAuthMode()" class="text-blue-600 font-bold">Masuk di sini</a>';
            document.getElementById("telegram-input-group").classList.toggle("hidden", isLoginMode);
        }

        async function handleAuth(event) {
            event.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const telegram_id = document.getElementById("telegram_id").value;

            try {
                if (isLoginMode) {
                    const formData = new URLSearchParams(); formData.append("username", username); formData.append("password", password);
                    const res = await fetch("/api/login", { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: formData });
                    if (res.ok) {
                        const data = await res.json(); localStorage.setItem("token", data.access_token);
                        cekStatusLogin(); Swal.fire({ icon: 'success', title: 'Berhasil Masuk!', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
                    } else throw new Error('Username atau password salah.');
                } else {
                    const res = await fetch("/api/register", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username, password, telegram_id }) });
                    if (res.ok) { Swal.fire('Berhasil!', 'Silakan masuk.', 'success'); toggleAuthMode(); }
                    else { const err = await res.json(); throw new Error(err.detail); }
                }
            } catch (error) {
                Swal.fire('Gagal', error.message, 'error');
            }
        }

        function logout() { localStorage.removeItem("token"); cekStatusLogin(); }

        async function cekStatusLogin() {
            const token = localStorage.getItem("token");
            if (token) {
                document.getElementById("auth-section").classList.add("hidden");
                document.getElementById("dashboard-section").classList.remove("hidden");
                loadProfil(); loadTugas();
            } else {
                document.getElementById("auth-section").classList.remove("hidden");
                document.getElementById("dashboard-section").classList.add("hidden");
            }
        }
        function getAuthHeaders() { return { "Content-Type": "application/json", "Authorization": `Bearer ${localStorage.getItem("token")}` }; }

        async function loadProfil() {
            try {
                const res = await fetch("/api/me", { headers: getAuthHeaders() });
                if (res.ok) { const user = await res.json(); document.getElementById("user-display-name").innerText = user.username.toUpperCase(); }
            } catch (e) { console.error("Gagal memuat profil"); }
        }

        async function loadTugas() {
            try {
                const res = await fetch("/api/tugas/", { headers: getAuthHeaders() });
                if (res.status === 401) { logout(); return; }
                semuaTugas = await res.json();
                renderTugas(); updateProgress();
            } catch (e) { console.error("Gagal memuat tugas"); }
        }

        function updateProgress() {
            if (semuaTugas.length === 0) { document.getElementById("progress-bar").style.width = "0%"; document.getElementById("progress-text").innerText = "0%"; return; }
            const selesai = semuaTugas.filter(t => t.is_selesai).length;
            const pct = Math.round((selesai / semuaTugas.length) * 100);
            document.getElementById("progress-bar").style.width = `${pct}%`; document.getElementById("progress-text").innerText = `${pct}% (${selesai}/${semuaTugas.length})`;
        }

        function renderTugas() {
            const listTugas = document.getElementById("list-tugas");
            listTugas.innerHTML = "";
            const searchQ = document.getElementById("search-input").value.toLowerCase();
            const filterStat = document.getElementById("filter-status").value;

            let tugasTampil = semuaTugas.filter(t => {
                let matchSearch = t.mata_kuliah.toLowerCase().includes(searchQ) || t.deskripsi.toLowerCase().includes(searchQ);
                let matchFilter = true;
                if(filterStat === "Aktif") matchFilter = !t.is_selesai;
                else if(filterStat === "Selesai") matchFilter = t.is_selesai;
                else if(filterStat === "Tinggi") matchFilter = (t.prioritas === "Tinggi");
                return matchSearch && matchFilter;
            });

            tugasTampil.sort((a, b) => {
                if (a.is_selesai === b.is_selesai) return new Date(a.deadline) - new Date(b.deadline);
                return a.is_selesai ? 1 : -1;
            });

            if (tugasTampil.length === 0) {
                listTugas.innerHTML = `<div class="text-center p-6 bg-white rounded-xl shadow text-gray-500 text-sm">Tidak ada tugas.</div>`;
                return;
            }

            tugasTampil.forEach(tugas => {
                const isS = tugas.is_selesai;
                const bgW = isS ? "bg-gray-100 opacity-75" : "bg-white";
                const textC = isS ? "line-through text-gray-400" : "text-gray-800";
                
                let borderKiri = "border-green-500"; let badgeW = "bg-green-100 text-green-700";
                if (tugas.prioritas === "Tinggi") { borderKiri = isS ? "border-gray-400" : "border-red-500"; badgeW = "bg-red-100 text-red-700"; }
                else if (tugas.prioritas === "Sedang") { borderKiri = isS ? "border-gray-400" : "border-yellow-500"; badgeW = "bg-yellow-100 text-yellow-700"; }

                listTugas.innerHTML += `
                    <div class="${bgW} p-4 md:p-5 rounded-xl shadow-md border-l-8 ${borderKiri} flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div class="w-full">
                            <div class="flex flex-wrap items-center gap-2 mb-2">
                                <h3 class="font-bold text-lg md:text-xl ${textC}">${tugas.mata_kuliah}</h3>
                                <span class="text-xs font-bold px-2 py-1 rounded-full ${badgeW}">${tugas.prioritas}</span>
                                ${isS ? '<span class="text-xs font-bold px-2 py-1 rounded-full bg-blue-100 text-blue-700">✅ Selesai</span>' : ''}
                            </div>
                            <p class="${textC} font-medium text-sm md:text-base">${tugas.deskripsi}</p>
                            <p class="text-xs md:text-sm text-red-500 mt-2 font-semibold flex items-center">
                                📅 ${new Date(tugas.deadline).toLocaleString('id-ID', {day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit'})}
                            </p>
                        </div>
                        
                        <!-- Tombol Full Width di Mobile -->
                        <div class="flex gap-2 w-full md:w-auto">
                            <button onclick="toggleStatus(${tugas.id})" class="flex-1 md:flex-none ${isS ? 'bg-yellow-500' : 'bg-green-500'} text-white px-3 py-2 rounded-lg font-bold text-sm shadow">
                                ${isS ? 'Batal' : '✔ Selesai'}
                            </button>
                            <button onclick="siapkanEdit(${tugas.id})" class="bg-blue-500 text-white px-3 py-2 rounded-lg font-bold text-sm shadow" ${isS ? 'disabled' : ''}>✏️</button>
                            <button onclick="hapusTugas(${tugas.id})" class="bg-red-500 text-white px-3 py-2 rounded-lg font-bold text-sm shadow">🗑️</button>
                        </div>
                    </div>
                `;
            });
        }

        async function simpanTugas() {
            const data = { matkul: document.getElementById("matkul").value, deskripsi: document.getElementById("deskripsi").value, deadline: document.getElementById("deadline").value, prioritas: document.getElementById("prioritas").value };
            
            if (!data.matkul || !data.deadline) { 
                Swal.fire('Oops!', 'Mata kuliah dan deadline wajib diisi!', 'warning'); 
                return; 
            }

            // Ubah tombol jadi status loading biar kelihatan diklik
            const btnSimpan = document.getElementById("btn-simpan");
            const teksAsli = btnSimpan.innerText;
            btnSimpan.innerText = "⏳ Menyimpan...";
            btnSimpan.disabled = true;
            
            let url = "/api/tugas/"; let method = "POST";
            let sendData = { mata_kuliah: data.matkul, deskripsi: data.deskripsi, deadline: data.deadline, prioritas: data.prioritas, is_selesai: false };

            if (editId) {
                url = `/api/tugas/${editId}`; method = "PUT";
                sendData.is_selesai = semuaTugas.find(t => t.id === editId).is_selesai;
            }

            try {
                const res = await fetch(url, { method: method, headers: getAuthHeaders(), body: JSON.stringify(sendData) });
                
                if (res.ok) { 
                    Swal.fire({ icon: 'success', title: editId ? 'Terupdate!' : 'Tersimpan!', showConfirmButton: false, timer: 1500 }); 
                    kosongkanForm(); 
                    loadTugas(); 
                } else {
                    const err = await res.json();
                    throw new Error(err.detail || "Gagal menyimpan ke database");
                }
            } catch (error) {
                Swal.fire('Gagal Menyimpan!', error.message, 'error');
            } finally {
                // Kembalikan tombol seperti semula
                btnSimpan.innerText = teksAsli;
                btnSimpan.disabled = false;
            }
        }

        async function hapusTugas(id) {
            const conf = await Swal.fire({ title: 'Yakin hapus?', text: "Tidak bisa dikembalikan!", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'Hapus!' });
            if (conf.isConfirmed) { await fetch(`/api/tugas/${id}`, { method: "DELETE", headers: getAuthHeaders() }); loadTugas(); }
        }

        async function toggleStatus(id) {
            const tugas = semuaTugas.find(t => t.id === id); tugas.is_selesai = !tugas.is_selesai;
            await fetch(`/api/tugas/${id}`, { method: "PUT", headers: getAuthHeaders(), body: JSON.stringify(tugas) });
            if(tugas.is_selesai) Swal.fire({ icon: 'success', title: 'Mantap!', text: 'Beban hidup berkurang.', showConfirmButton: false, timer: 1500 });
            loadTugas();
        }

        function siapkanEdit(id) {
            const tugas = semuaTugas.find(t => t.id === id);
            document.getElementById("matkul").value = tugas.mata_kuliah; document.getElementById("deskripsi").value = tugas.deskripsi;
            document.getElementById("deadline").value = new Date(tugas.deadline).toISOString().slice(0, 16);
            document.getElementById("prioritas").value = tugas.prioritas;
            editId = id; document.getElementById("form-title").innerText = "✏️ Edit Tugas"; document.getElementById("btn-simpan").innerText = "Update"; document.getElementById("btn-batal").classList.remove("hidden"); window.scrollTo(0,0);
        }

        function batalEdit() { kosongkanForm(); }
        function kosongkanForm() { document.getElementById("matkul").value = ""; document.getElementById("deskripsi").value = ""; document.getElementById("deadline").value = ""; editId = null; document.getElementById("form-title").innerText = "📝 Tambah Tugas Baru"; document.getElementById("btn-simpan").innerText = "Simpan Tugas"; document.getElementById("btn-batal").classList.add("hidden"); }

        cekStatusLogin();
    </script>
</body>
</html>
